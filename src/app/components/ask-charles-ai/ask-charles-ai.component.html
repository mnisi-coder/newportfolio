<aside class="assistant-widget" [class.assistant-open]="isOpen" aria-label="Ask Charles AI assistant">
  @if (isOpen) {
    <div class="assistant-panel" role="dialog" aria-labelledby="assistant-title">
      <div class="assistant-header">
        <div>
          <p class="assistant-kicker">Local assistant</p>
          <h2 id="assistant-title">Ask Charles AI</h2>
        </div>
        <button type="button" class="assistant-close" (click)="toggle()" aria-label="Close Ask Charles AI">
          Close
        </button>
      </div>

      <p class="assistant-description">
        Ask about my projects, skills, background, live apps, or what I enjoy building.
      </p>

      <div class="assistant-response" aria-live="polite">
        <span class="assistant-avatar" aria-hidden="true">AI</span>
        <p>{{ response }}</p>
      </div>

      <div class="assistant-suggestions" aria-label="Suggested questions">
        @for (suggestedQuestion of suggestedQuestions; track suggestedQuestion) {
          <button type="button" (click)="askSuggestedQuestion(suggestedQuestion)">
            {{ suggestedQuestion }}
          </button>
        }
      </div>

      <form class="assistant-form" (ngSubmit)="sendQuestion()">
        <label for="assistant-question">Ask a question</label>
        <div class="assistant-input-row">
          <textarea
            id="assistant-question"
            name="assistantQuestion"
            [(ngModel)]="question"
            rows="2"
            placeholder="Ask about Charles, projects, skills, or live apps"
          ></textarea>
          <button type="submit" [disabled]="!question.trim()" aria-label="Send question to Ask Charles AI">
            Send
          </button>
        </div>
      </form>
    </div>
  }

  <button
    type="button"
    class="assistant-launcher"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen"
    aria-label="Open Ask Charles AI"
  >
    Ask Charles AI
  </button>
</aside>
